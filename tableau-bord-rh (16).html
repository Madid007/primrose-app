<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--gn:#3a6b35;--gl:#4e8f47;--gd:#2a4e26;--gb:#f0f5ef;--ac:#e8a020;--bl:#2980b9;--pu:#8e44ad;--or:#e67e22;--ok:#27ae60;--dn:#c0392b;--mu:#6b7f69;--br:#d4e4d2}
body{font-family:'Source Sans 3',sans-serif;background:var(--gb);color:#1a2e18;min-height:100vh}
.hdr{background:var(--gn);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-family:'Playfair Display',serif;color:#fff;font-size:16px;letter-spacing:1px}
.logo b{color:var(--ac);font-weight:inherit}
.hbg{background:rgba(255,255,255,.15);color:#fff;padding:3px 12px;border-radius:99px;font-size:11px}
.flt{background:#fff;border-bottom:2px solid var(--br);padding:8px 18px;display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fbs{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:4px 11px;border-radius:18px;font-size:11.5px;cursor:pointer;font-family:inherit;border:1.5px solid var(--br);background:#fff;color:#1a2e18;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--gn);color:var(--gn)}
.aD{background:var(--gd)!important;border-color:var(--gd)!important;color:#fff!important;font-weight:700!important}
.aA{background:var(--ac)!important;border-color:var(--ac)!important;color:#fff!important;font-weight:700!important}
.aG{background:var(--gn)!important;border-color:var(--gn)!important;color:#fff!important;font-weight:700!important}
.aALL{background:#546e7a!important;border-color:#546e7a!important;color:#fff!important;font-weight:700!important}
.main{padding:12px 18px;max-width:1300px;margin:0 auto}
.kg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.kg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.kc{background:#fff;border-radius:11px;padding:12px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.kv{font-size:20px;font-weight:700;margin:2px 0}.kl{font-size:11px;font-weight:600;margin-bottom:2px}.ks{font-size:10.5px;color:var(--mu)}
.bw{background:var(--gb);border-radius:99px;overflow:hidden}.bf{border-radius:99px;transition:width .35s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:12px}
.wc{background:#fff;border-radius:11px;padding:11px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.sc{background:#fff;border-radius:9px;border:.5px solid var(--br);padding:10px 11px;font-size:11px;transition:opacity .2s}
.sc.off{opacity:.28}
.bc{background:#fff;border-radius:11px;box-shadow:0 2px 6px rgba(0,0,0,.06);overflow:hidden}
.bh{padding:9px 14px;color:#fff;font-size:12.5px;font-weight:700}.bb{padding:12px 14px}
.pb{border-radius:7px;padding:9px 11px;margin-bottom:10px}
.gb3{background:#f0faf2;border:1px solid #c8e6c9}
.pm3{background:#fff;border-radius:5px;padding:5px 8px;text-align:center}.pm3 label{display:block;font-size:9px;color:var(--mu)}
.msg{border-radius:8px;padding:9px 13px;margin-bottom:10px;font-size:11px}
.msgw{background:#fff3cd;border:1px solid #ffc107;color:#856404}
.msgi{background:#e3f2fd;border:1px solid #bbdefb;color:#1a5276}
.banner{border-radius:10px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;color:#fff;font-weight:700;font-size:13px}
.stitle{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.stitle hr{flex:1;border:none;border-top:1px solid var(--br)}
.tabs{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--br);margin-bottom:12px}
.tab{flex:1;padding:9px 6px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;border:none;font-family:inherit;background:#fff;color:var(--mu);border-right:1px solid var(--br);transition:all .2s}
.tab:last-child{border-right:none}.tab.on{color:#fff;font-weight:700}
.kpi-n1{border-radius:11px;padding:13px 14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.kpi-n1.vrt{background:linear-gradient(135deg,#e8f5e9,#f0faf2);border-top:4px solid #27ae60}
.kpi-n1.amb{background:linear-gradient(135deg,#fff8e6,#fffbf0);border-top:4px solid #e8a020}
.kpi-n1.rge{background:linear-gradient(135deg,#fdecea,#fef5f4);border-top:4px solid #c0392b}
.kpi-n1.neu{background:#fff;border-top:4px solid #e8a020}
.n1-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;margin-top:4px}
.n1-badge.vrt{background:#e8f5e9;color:#1a6b35}.n1-badge.amb{background:#fff3cd;color:#856404}
.n1-badge.rge{background:#fdecea;color:#c0392b}.n1-badge.neu{background:#f5f5f5;color:#546e7a}
@media(max-width:960px){.kg4{grid-template-columns:repeat(2,1fr)}.g7{grid-template-columns:repeat(4,1fr)}}
@media(max-width:640px){.kg4{grid-template-columns:1fr 1fr}.g7{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}
/* PWA / Mobile */
body{-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
.hdr{position:sticky;top:0;z-index:100}
.flt{position:sticky;top:54px;z-index:99}
@media(max-width:480px){
  .fbs{gap:3px}
  .btn{padding:3px 8px;font-size:10.5px}
  .main{padding:8px 10px}
  .kg4{grid-template-columns:1fr 1fr}
  .g7{grid-template-columns:repeat(2,1fr)}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .kv{font-size:17px}
  .tabs .tab{font-size:10px;padding:7px 3px}
  .banner{font-size:11px;padding:8px 10px}
}
</style>

  h+='</div></div>';
  h+='<div class="wc" style="margin-bottom:10px"><div class="stitle"><span>Deductions Legales</span><hr></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
  var sbi=sd.net+sd.cnss+sd.amo;
  [{l:"CNSS (4.48%)",v:sd.cnss,c:"#c0392b"},{l:"AMO (2.26%)",v:sd.amo,c:"#e67e22"},{l:"Net Paye",v:sd.net,c:"#1a6b45"}].forEach(function(p){h+='<div class="pm3" style="border-top:3px solid '+p.c+';padding:8px"><label>'+p.l+'</label><strong style="color:'+p.c+';font-size:14px">'+fmt(p.v)+'</strong></div>';});
  h+='</div></div>';
  if(sd.sects&&Object.keys(sd.sects).length>0){
    h+='<div class="stitle"><span>Repartition par Secteur</span><hr></div><div class="wc" style="margin-bottom:12px">';
    var sk=Object.keys(sd.sects);var mxN=Math.max.apply(null,sk.map(function(k){return sd.sects[k].nb;}));
    sk.forEach(function(s){var sv=sd.sects[s];h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px"><div style="width:200px;font-weight:700">'+s+'</div><div style="flex:1">'+bar(sv.nb,mxN,cfg.c,8)+'</div><strong style="width:50px;text-align:right;color:'+cfg.c+'">'+sv.nb+' ouv</strong><span style="width:80px;text-align:right;color:var(--mu);font-size:10px">'+fmt(sv.net)+' MAD</span></div>';});
    h+='</div>';
  }
  return h;
}
function renderAll(q,prod){
  var specs2=Object.keys(q.specs||{});var totNet=0,totNb=0;
  specs2.forEach(function(k){var s=q.specs[k];if(s){totNet+=s.net;totNb+=s.nb;}});
  var h='<div class="banner" style="background:#2a4e26">&#127758; Toutes Speculations - '+camp+" - "+qKey+'</div>';
  h+='<div class="kg4" style="margin-bottom:12px"><div class="kc" style="border-top:4px solid #2a4e26"><div class="kv" style="color:#2a4e26">'+q.nb+'</div><div class="kl">Effectif Total</div></div>';
  h+='<div class="kc" style="border-top:4px solid #4e8f47"><div class="kv" style="color:#4e8f47">'+fmt(q.net)+' MAD</div><div class="kl">Net Paye Total</div><div class="ks">Moy: '+(q.nb>0?Math.round(q.net/q.nb):"--")+'/ouv</div></div>';
  h+='<div class="kc" style="border-top:4px solid #8e44ad"><div class="kv" style="color:#8e44ad">'+fmt(q.tot_primes)+' MAD</div><div class="kl">Primes Total</div><div class="ks">Anc:'+fmt(q.anc)+' Autres:'+fmt(q.autres)+'</div></div>';
  h+='<div class="kc" style="border-top:4px solid '+pc(q.tp)+'"><div class="kv" style="color:'+pc(q.tp)+'">'+q.tp+'%</div><div class="kl">Taux Presence</div>'+bar(q.tp,100,pc(q.tp),5)+'</div></div>';
  var SM={Oeillet:{c:"#3a6b35",i:"&#127801;",l:"Oeillet"},AF:{c:"#e67e22",i:"&#127867;",l:"Autres Fleurs"},Avocats:{c:"#16a085",i:"&#129361;",l:"Avocat"},Amarylis:{c:"#8e44ad",i:"&#127865;",l:"Amaryllis"},SG:{c:"#7f8c8d",i:"&#9881;",l:"Serv. General"}};
  h+='<div class="wc" style="margin-bottom:12px"><div class="stitle" style="margin-bottom:12px"><span>Repartition par Speculation</span><hr></div>';
  specs2.sort().forEach(function(k){
    var sd=q.specs[k];if(!sd||sd.net===0)return;var cfg=SM[k]||{c:"#666",i:"&#127758;",l:k};
    var p=totNet>0?(sd.net/totNet*100).toFixed(1):0;var pnb=totNb>0?(sd.nb/totNb*100).toFixed(0):0;
    h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span style="font-size:18px">'+cfg.i+'</span><div style="width:120px;font-weight:700;font-size:12px">'+cfg.l+'</div><div style="flex:1">'+bar(sd.net,totNet,cfg.c,10)+'</div><div style="text-align:right;min-width:200px"><div style="font-size:13px;font-weight:700;color:'+cfg.c+'">'+fmt(sd.net)+' MAD</div><div style="font-size:10px;color:var(--mu)">'+sd.nb+' ouv ('+pnb+'%) - '+p+'% MS</div></div></div>';
  });
  h+='</div><div class="msg msgi">Selectionnez <strong>Oeillet</strong> pour le zoom avec cout MO a la tige et comparatif N-1.</div>';
  return h;
}
