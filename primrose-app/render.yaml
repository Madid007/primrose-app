services:
  - type: web
    name: primrose-rh
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_USER
        value: anass
      - key: ADMIN_PASS
        generateValue: true
      - key: VIEWER_PASS
        generateValue: true
    disk:
      name: primrose-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
